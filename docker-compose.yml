services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/your-org/dede-backend:${IMAGE_TAG:-latest}
    container_name: dede-backend
    environment:
      - VIRTUAL_HOST=dede-backend.kejahook.co.ke
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=dede-backend.kejahook.co.ke
      - LETSENCRYPT_EMAIL=mikkohbrayoh@gmail.com
      - DB_USER=admin
      - DB_PASSWORD=R7n#xE!dG2
      - DB_HOST=dedes.czgk0wyoco08.us-east-1.rds.amazonaws.com
      - DB_PORT=3306
      - DB_NAME=dedes
    expose:
      - "8000"
    ports:
      - "8000:8000"  # 👈 EXPOSE TO HOST
    volumes:
      - ./auth:/app/auth
      - ./routers:/app/routers
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
